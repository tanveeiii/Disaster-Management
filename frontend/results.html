<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earthquake Report</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- html2canvas for download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { bg:"#DFE5F3", primary:"#557373", dark:"#272401", card:"#F2EFEA" },
        fontFamily: { heading:["Playfair Display","serif"], body:["Inter","sans-serif"] }
      }
    }
  }
</script>
</head>
<body class="bg-bg font-body min-h-screen p-6 opacity-0 transition-opacity duration-700">

<div id="reportContent" class="max-w-5xl mx-auto space-y-6">

  <h1 class="text-3xl font-heading text-dark text-center">Earthquake Analysis Report</h1>

  <!-- Risk Badge -->
  <div id="riskBadge" class="text-white font-bold px-4 py-2 rounded-xl w-fit mx-auto"></div>

  <!-- Info Cards -->
  <div class="grid md:grid-cols-3 gap-4 text-center">
    <div class="bg-card p-5 rounded-xl shadow-sm">
      <p class="text-gray-500">Risk Level</p>
      <p id="risk" class="text-xl font-bold mt-1"></p>
    </div>
    <div class="bg-card p-5 rounded-xl shadow-sm">
      <p class="text-gray-500">Magnitude</p>
      <p id="mag" class="text-xl font-bold mt-1"></p>
    </div>
    <div class="bg-card p-5 rounded-xl shadow-sm">
      <p class="text-gray-500">Affected Radius</p>
      <p id="radius" class="text-xl font-bold mt-1"></p>
    </div>
  </div>

  <!-- Recommendation -->
  <div class="bg-card p-5 rounded-xl shadow-sm">
    <h3 class="text-lg font-semibold mb-2">Recommendation</h3>
    <p id="rec" class="text-gray-700"></p>
  </div>

  <!-- Map -->
  <div class="bg-card p-5 rounded-xl shadow-sm">
    <h3 class="text-lg font-semibold mb-3">Location Map</h3>
    <iframe id="mapFrame" class="w-full h-64 rounded-lg border-0" loading="lazy"></iframe>
  </div>

  <!-- Charts -->
  <div class="grid md:grid-cols-2 gap-6">
    <div class="bg-card p-5 rounded-xl shadow-sm">
      <h3 class="text-lg font-semibold mb-3">Impact Analysis</h3>
      <canvas id="chart1"></canvas>
    </div>
    <div class="bg-card p-5 rounded-xl shadow-sm">
      <h3 class="text-lg font-semibold mb-3">Seismic Trend</h3>
      <canvas id="chart2"></canvas>
    </div>
  </div>

  <!-- Download -->
  <button id="download" class="w-full py-3 bg-dark text-white rounded-xl hover:scale-105 transition">
    Download Report
  </button>

</div>

<script>
// Fade-in effect
window.onload = () => { document.body.classList.remove("opacity-0"); };

// 📦 Get dataset from localStorage
const data = JSON.parse(localStorage.getItem("resultData"));
if (!data) { 
  alert("No earthquake data found!"); 
  window.location.href = "upload.html"; // redirect to upload page if no data
}

// 🧾 Fill values in info cards
document.getElementById("risk").innerText = data.risk_level.toUpperCase();
document.getElementById("mag").innerText = data.magnitude + " Richter";
document.getElementById("radius").innerText = data.affected_radius_km + " km";
document.getElementById("rec").innerText = data.recommendation;

// 🎨 Risk Colors
let barColor = "#557373", badgeColor = "#16a34a";
if (data.risk_level === "High") { barColor = "#dc2626"; badgeColor = "#dc2626"; }
else if (data.risk_level === "Medium") { barColor = "#f59e0b"; badgeColor = "#f59e0b"; }

const badge = document.getElementById("riskBadge");
badge.innerText = data.risk_level.toUpperCase() + " RISK";
badge.style.background = badgeColor;

// 🗺️ Map
const lat = data.latitude || 20.5937; // fallback India
const lon = data.longitude || 78.9629;
document.getElementById("mapFrame").src = `https://maps.google.com/maps?q=${lat},${lon}&z=6&output=embed`;

// 📊 Bar Chart: Magnitude & Impact Radius
new Chart(document.getElementById("chart1"), {
  type: "bar",
  data: {
    labels: ["Magnitude", "Impact Radius (km)"],
    datasets: [{
      data: [data.magnitude, data.affected_radius_km],
      backgroundColor: [barColor, "#272401"],
      borderRadius: 12
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    animation: { duration: 1500, easing: "easeOutQuart" },
    scales: { y: { beginAtZero: true } }
  }
});

// 📈 Line Chart: Seismic History
new Chart(document.getElementById("chart2"), {
  type: "line",
  data: {
    labels: ["Past 1","Past 2","Past 3","Past 4","Now"],
    datasets: [{
      data: data.history,
      borderColor: "#557373",
      backgroundColor: "rgba(85,115,115,0.2)",
      fill: true,
      tension: 0.4,
      pointRadius: 4
    }]
  },
  options: {
    responsive: true,
    animation: { duration: 1500 }
  }
});

// 📥 Download Report as Image
document.getElementById("download").onclick = async () => {
  const element = document.getElementById("reportContent");
  await new Promise(r => setTimeout(r, 500)); // wait for charts render
  html2canvas(element, { scale: 2 }).then(canvas => {
    const img = canvas.toDataURL("image/png");
    const win = window.open("");
    win.document.write(`<html><body style="margin:0"><img src="${img}" style="width:100%"></body></html>`);
    win.document.close();
    win.print();
  });
};
</script>

</body>
</html>
