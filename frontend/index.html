<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disaster Analysis</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: "#DFE5F3",
        primary: "#557373",
        dark: "#272401",
        card: "#F2EFEA",
        accent: "#dc2626"
      },
      fontFamily: {
        heading: ["Poppins", "sans-serif"],
        body: ["Poppins", "sans-serif"]
      }
    }
  }
}
</script>

<style>
/* Animations */
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { to { opacity: 1; transform: scale(1); } }
.animate-fadeInUp { animation: fadeInUp 0.8s ease forwards; opacity:0; transform: translateY(20px);}
.animate-scaleIn { animation: scaleIn 0.6s ease forwards; animation-delay:0.2s; opacity:0; transform: scale(0.95);}
</style>
</head>

<body class="bg-bg font-body min-h-screen flex items-center justify-center">

<div class="w-full max-w-4xl p-6">

  <!-- Header -->
  <div class="text-center mb-10 animate-fadeInUp">
    <h1 class="text-5xl font-heading font-bold text-dark tracking-wide">DISASTER ANALYSIS</h1>
    <p class="text-gray-500 mt-2 text-lg">Upload datasets & analyze seismic risk</p>
  </div>

  <!-- Card -->
  <div class="bg-card/90 backdrop-blur-md border border-white/30 rounded-3xl p-10 shadow-xl animate-scaleIn">

    <form id="form" class="space-y-8">

      <!-- File Uploads -->
      <div class="grid md:grid-cols-2 gap-6">

        <label class="cursor-pointer">
          <div class="border-2 border-dashed border-primary/40 rounded-2xl p-6 text-center hover:border-primary transition">
            <p class="text-dark font-semibold text-lg">Upload Dataset 1</p>
            <p id="file1Name" class="text-sm text-gray-500 mt-1">Click to choose file</p>
            <input type="file" name="file1" required class="hidden">
          </div>
        </label>

        <label class="cursor-pointer">
          <div class="border-2 border-dashed border-primary/40 rounded-2xl p-6 text-center hover:border-primary transition">
            <p class="text-dark font-semibold text-lg">Upload Dataset 2</p>
            <p id="file2Name" class="text-sm text-gray-500 mt-1">Click to choose file</p>
            <input type="file" name="file2" required class="hidden">
          </div>
        </label>

      </div>

      <!-- Latitude & Longitude -->
      <div class="grid md:grid-cols-2 gap-6">
        <input type="number" step="any" name="latitude" placeholder="Latitude" required
        class="p-4 bg-white rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/30 outline-none font-medium">

        <input type="number" step="any" name="longitude" placeholder="Longitude" required
        class="p-4 bg-white rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/30 outline-none font-medium">
      </div>

      <!-- Submit Button -->
      <button id="submitBtn"
      class="w-full py-4 rounded-2xl text-white bg-primary text-lg font-semibold shadow-md hover:shadow-xl hover:scale-[1.02] active:scale-95 transition duration-300">
        Analyze Disaster Data
      </button>

    </form>
  </div>

  <!-- Loader -->
  <div id="loader" class="hidden text-center mt-10">
    <div class="flex justify-center">
      <div class="w-14 h-14 border-4 border-primary/30 border-t-primary rounded-full animate-spin"></div>
    </div>
    <p class="mt-4 text-primary font-semibold animate-pulse text-lg">
      Processing seismic patterns...
    </p>
  </div>

</div>

<script>
const form = document.getElementById("form");
const loader = document.getElementById("loader");
const btn = document.getElementById("submitBtn");

// Show file names dynamically
form.file1.addEventListener("change", () => {
  document.getElementById("file1Name").innerText = form.file1.files[0]?.name || "Click to choose file";
});
form.file2.addEventListener("change", () => {
  document.getElementById("file2Name").innerText = form.file2.files[0]?.name || "Click to choose file";
});

// Submit form (dummy frontend only)
form.addEventListener("submit", (e) => {
  e.preventDefault();

  const lat = form.latitude.value;
  const lon = form.longitude.value;

  if (!lat || !lon) { alert("Enter latitude & longitude"); return; }

  btn.disabled = true;
  btn.innerText = "Analyzing...";
  loader.classList.remove("hidden");

  // simulate processing
  setTimeout(() => {
    alert("✅ Frontend workflow complete! Ready to send to backend.");
    btn.disabled = false;
    btn.innerText = "Analyze Disaster Data";
    loader.classList.add("hidden");
  }, 1500);
});
</script>

</body>
</html>
